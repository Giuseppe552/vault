name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Typecheck web
        run: cd apps/web && npx tsc --noEmit

      - name: Typecheck api
        run: cd apps/api && npx tsc --noEmit

      - name: Test
        run: cd apps/web && npx vitest run
